apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nithin-shop-checkout
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: nithin-shop
  source:
    repoURL: https://github.com/nithingowdahm87/eks-ecommerce-gitops
    targetRevision: main
    path: src/checkout/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nithin-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
